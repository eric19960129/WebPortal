<!DOCTYPE html>
<html lang="zh-TW">
 <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>入口網站</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
   tailwind.config = { darkMode: 'class' }
  </script>
  <style>
   @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

   body {
    font-family: 'Noto Sans TC', sans-serif;
   }

   .cards-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
   }

   @media (max-width: 480px) {
    .cards-grid {
     gap: 10px;
    }
   }
  </style>
  <!-- 提示：如果這兩個是測試用的外部檔案，不需要也可以整行刪除 -->
  <script src="https://eric19960129.github.io/WebExtra/webExtraInfo/WebPortal/config.js"></script>
  <script src="api.js"></script>
 </head>
 <body
  class="bg-slate-50 dark:bg-slate-950 min-h-screen text-slate-900 dark:text-slate-100 transition-colors duration-300">
  <header class="max-w-7xl mx-auto px-4 sm:px-6 py-5 md:py-8 border-b border-slate-200 dark:border-slate-800">
   <div class="flex items-center justify-between">
    <h1 id="ui-main-title" class="text-2xl sm:text-3xl md:text-4xl font-black tracking-tighter dark:text-white">
     入口控制台
    </h1>
    <div class="flex items-center gap-2 sm:gap-4">
     <select id="lang-select"
      class="bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 py-2 px-3 rounded-2xl font-bold text-sm sm:text-base outline-none cursor-pointer">
      <option value="zh">繁體中文</option>
      <option value="en">English</option>
     </select>
     <button onclick="toggleDarkMode()"
      class="p-2.5 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-2xl shadow-sm hover:scale-105 active:scale-95 transition-all">
      <span class="dark:hidden text-2xl">🌙</span>
      <span class="hidden dark:inline text-2xl">☀️</span>
     </button>
    </div>
   </div>
  </header>
  <main id="portal-container" class="max-w-7xl mx-auto px-4 sm:px-6 py-6 md:py-10 space-y-6 md:space-y-8">
  </main>
 </body>
</html>
